<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Task Manager Pro</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header>

    <h1>Task Manager Pro</h1>

    <button id="darkModeBtn">
        🌙 Dark Mode
    </button>

</header>

<main class="container">

<section class="task-form">

<h2>Add New Task</h2>

<input
type="text"
id="taskTitle"
placeholder="Task Title">

<textarea
id="taskDescription"
placeholder="Task Description"></textarea>

<select id="taskPriority">

<option value="Low">Low</option>

<option value="Medium">
Medium
</option>

<option value="High">
High
</option>

</select>

<input
type="date"
id="taskDueDate">

<select id="taskCategory">

<option value="Personal">
Personal
</option>

<option value="Office">
Office
</option>

</select>

<button id="addTaskBtn">
Add Task
</button>

</section>

<section class="controls">

<input
type="text"
id="searchBox"
placeholder="Search Task">

<select id="filterPriority">

<option value="All">
All Priorities
</option>

<option value="High">
High
</option>

<option value="Medium">
Medium
</option>

<option value="Low">
Low
</option>

</select>

<button id="loadJsonBtn">
Load Sample Tasks
</button>

<button id="exportBtn">
Export JSON
</button>

<input
type="file"
id="importFile"
accept=".json">

<button id="importBtn">
Import JSON
</button>

</section>

<section id="statistics">

<h2>Statistics</h2>

<p>Total Tasks :
<span id="totalTasks">0</span></p>

<p>Completed :
<span id="completedTasks">0</span></p>

<p>Pending :
<span id="pendingTasks">0</span></p>

</section>

<section id="loading">

Loading...

</section>

<section>

<h2>Your Tasks</h2>

<div id="taskContainer">

</div>

</section>

</main>

<footer>

<p>
Task Manager Pro using Advanced JavaScript
</p>

</footer>

<script type="module" src="js/main.js"></script>

</body>

</html>
